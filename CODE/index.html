<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAAD — Couvaras Architects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    /* SLIDES */
    .slide {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .slide.active { opacity: 1; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.45) 100%
      );
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 36px;
    }

    .nav-logo {
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      position: relative;
      z-index: 200;
    }

    .nav-logo span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* HAMBURGER DROPDOWN */
    .hamburger-menu {
      display: none;
      position: absolute;
      top: 36px;
      left: 0;
      background: none;
      padding: 12px 0;
      min-width: 160px;
      flex-direction: column;
      z-index: 150;
    }

    .nav-logo:hover .hamburger-menu { display: flex; }

    .hamburger-menu a {
      display: block;
      padding: 8px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .hamburger-menu a:hover { opacity: 1; }

    .nav-links {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links li { position: relative; }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }

    .dropdown-toggle {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dropdown-toggle::after {
      content: '▾';
      font-size: 0.6rem;
      opacity: 0.7;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      padding: 12px 0;
      min-width: 160px;
      list-style: none;
    }

    .nav-links li:hover .dropdown-menu { display: block; }

    .dropdown-menu li a {
      display: block;
      padding: 8px 20px;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      opacity: 0.7;
      white-space: nowrap;
    }

    .dropdown-menu li a:hover { opacity: 1; }

    /* PROJECT INFO */
    .project-info {
      position: fixed;
      bottom: 52px;
      left: 36px;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    .project-info .project-name {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .project-info .project-meta {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    .project-info .project-firm {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 16px;
    }

    .view-project {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .view-project:hover { border-color: #fff; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 36px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .bottom-bar span {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    /* DOT NAV */
    .dot-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #fff; }

    /* ARROWS */
    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
      padding: 12px;
    }

    .arrow:hover { opacity: 0.9; }
    .arrow-left { left: 12px; }
    .arrow-right { right: 12px; }
  </style>
</head>
<body>

  <!-- SLIDES -->
  <div class="slide active">
    <img src="IMAGES/images/images/dugs/interior-01.jpg" alt="Dugs" />
    <div class="slide-overlay"></div>
  </div>
  <div class="slide">
    <img src="IMAGES/images/images/beacons/exterior-01.jpg" alt="The Beacons" />
    <div class="slide-overlay"></div>
  </div>
  <div class="slide">
    <img src="IMAGES/images/images/Bryon Bay/Render 1.jpg" alt="Byron Bay" />
    <div class="slide-overlay"></div>
  </div>
  <div class="slide">
    <img src="IMAGES/images/images/Dural/1-6.jpg" alt="Dural" />
    <div class="slide-overlay"></div>
  </div>
  <div class="slide">
    <img src="IMAGES/images/images/Mortain Bay/2017946648_1_1_220720_044027-w2000-h1334.jpg" alt="Mortain Bay" />
    <div class="slide-overlay"></div>
  </div>
  <div class="slide">
    <img src="IMAGES/images/images/Loftus/Black roof FRONT.jpg" alt="Loftus" />
    <div class="slide-overlay"></div>
  </div>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <span></span>
      <span></span>
      <div class="hamburger-menu">
        <a href="work.html">Work</a>
        <a href="#">About</a>
    <a href="#">Contact</a>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- PROJECT INFO -->
  <div class="project-info" id="project-info">
    <div class="project-name" id="proj-name"></div>
    <div class="project-meta" id="proj-meta"></div>
    <div class="project-firm">Couvaras Architects</div>
    <a href="#" class="view-project" id="proj-link">View Project</a>
  </div>

  <!-- ARROWS -->
  <button class="arrow arrow-left" onclick="prev()">&#8592;</button>
  <button class="arrow arrow-right" onclick="next()">&#8594;</button>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <span>Couvaras Architects &amp; Design</span>
    <span>&copy; 2026</span>
    <span>Sydney, Australia</span>
  </div>

  <!-- DOT NAV -->
  <div class="dot-nav" id="dots"></div>

  <script>
    const projects = [
      { name: 'Dugs',         meta: 'Sydney, NSW · Residential · 2024', link: 'project-dugs.html' },
      { name: 'The Beacons',  meta: 'Sydney, NSW · Residential · 2025', link: 'project-beacons.html' },
      { name: 'Byron Bay',    meta: 'Byron Bay, NSW · Residential · 2025', link: 'project-byron-bay.html' },
      { name: 'Dural',        meta: 'Dural, NSW · Residential · 2025', link: 'project-dural.html' },
      { name: 'Mortain Bay',  meta: 'Sydney, NSW · Residential · 2022', link: 'project-mortain-bay.html' },
      { name: 'Loftus',       meta: 'Loftus, NSW · Residential · 2026', link: 'project-loftus.html' },
    ];

    const slides = document.querySelectorAll('.slide');
    const dotsEl = document.getElementById('dots');
    let current = 0;

    projects.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.onclick = () => goTo(i);
      dotsEl.appendChild(d);
    });

    function updateInfo() {
      const p = projects[current];
      document.getElementById('proj-name').textContent = p.name;
      document.getElementById('proj-meta').textContent = p.meta;
      document.getElementById('proj-link').href = p.link;
    }

    function goTo(n) {
      slides[current].classList.remove('active');
      dotsEl.children[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      dotsEl.children[current].classList.add('active');
      updateInfo();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });

    updateInfo();

  </script>

</body>
</html>
